<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客詳細</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">顧客詳細</h2>

    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <td id="customerId"></td>
        </tr>

        <tr>
            <th>会社名</th>
            <td id="companyName"></td>
        </tr>

        <tr>
            <th>業種</th>
            <td id="industry"></td>
        </tr>

        <tr>
            <th>連絡先</th>
            <td id="contact"></td>
        </tr>

        <tr>
            <th>所在地</th>
            <td id="location"></td>
        </tr>

        <tr>
            <th>作成日</th>
            <td id="createdDate"></td>
        </tr>

        <tr>
            <th>更新日</th>
            <td id="updatedDate"></td>
        </tr>
    </table>

    <a id="updateLink" class="btn btn-primary" href="#">編集</a>
    <button id="deleteBtn" class="btn btn-danger">削除</button>
    <a id="caseAddLink" class="btn btn-success" href="#">案件登録</a>
    <a href="./list.html" class="btn btn-secondary">戻る</a>

    <hr class="my-4">

<h3 class="mb-3">案件一覧</h3>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>案件ID</th>
            <th>案件名</th>
            <th>ステータス</th>
            <th>受注見込額</th>
            <th>担当者</th>
        </tr>
    </thead>
    <tbody id="caseList">
    </tbody>
</table>

</div>

<script type="module">
import config from "../config.js";

// URLからidを取得
const params = new URLSearchParams(location.search);
const customerId = params.get("id") || params.get("customerId");
document.getElementById("updateLink").href = `./update.html?id=${customerId}`;
// APIから顧客情報を取得
fetch(`${config.apiUrl}/customer/${customerId}`)
  .then(response => response.json())
  .then(customer => {
    document.getElementById("customerId").textContent = customer.customer_id;
    document.getElementById("companyName").textContent = customer.company_name;
    document.getElementById("industry").textContent = customer.industry;
    document.getElementById("contact").textContent = customer.contact;
    document.getElementById("location").textContent = customer.location;
    document.getElementById("createdDate").textContent = customer.created_date;
    document.getElementById("updatedDate").textContent = customer.updated_date;
    document.getElementById("caseAddLink").href =
  `../case/add.html?customerId=${customerId}`;
  })
  .catch(error => {
    console.error(error);
    alert("顧客情報の取得に失敗しました。");
  });

  // 顧客に紐づく案件一覧を取得
fetch(`${config.apiUrl}/cases/${customerId}`)
  .then(response => response.json())
  .then(cases => {
    const caseList = document.getElementById("caseList");

    if (cases.length === 0) {
      caseList.innerHTML = `
        <tr>
          <td colspan="5" class="text-center">登録されている案件はありません。</td>
        </tr>
      `;
      return;
    }

    cases.forEach(caseItem => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${caseItem.case_id}</td>
        <td>${caseItem.case_name}</td>
        <td>${caseItem.case_status}</td>
        <td>${caseItem.expected_revenue}</td>
        <td>${caseItem.representative}</td>
      `;

      caseList.appendChild(row);
    });
  })
  .catch(error => {
    console.error(error);
    alert("案件一覧の取得に失敗しました。");
  });

  document.getElementById("deleteBtn").addEventListener("click", function () {
    alert("削除していいですか？");
});
</script>

</body>
</html>
